services:
  mysql:
    image: mysql:8.0
    container_name: guqin-school-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: guqin_school_management
      MYSQL_USER: guqin
      MYSQL_PASSWORD: guqin123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
